name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  engine-checks:
    name: Python Engine
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        working-directory: packages/engine
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: packages/engine
        run: ruff check sentinel/ tests/

      - name: Format check (ruff)
        working-directory: packages/engine
        run: ruff format --check sentinel/ tests/

      - name: Run migrations
        working-directory: packages/engine
        env:
          DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@localhost:5432/sentinel_test
        run: alembic upgrade head

      - name: Run tests
        working-directory: packages/engine
        env:
          DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@localhost:5432/sentinel_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: development
          MARKET_DATA_PROVIDER: mock
        run: pytest tests/ -v --cov=sentinel --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: packages/engine/coverage.xml
          flags: engine
          token: ${{ secrets.CODECOV_TOKEN }}

  mcp-checks:
    name: TypeScript MCP
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        working-directory: packages/mcp
        run: pnpm typecheck

      - name: Lint
        working-directory: packages/mcp
        run: pnpm lint

      - name: Build
        working-directory: packages/mcp
        run: pnpm build

      - name: Test
        working-directory: packages/mcp
        run: pnpm test
