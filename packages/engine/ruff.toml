target-version = "py312"
line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
]
ignore = [
    "B008",  # FastAPI intentionally uses Depends() in defaults
    "B904",  # raise-without-from inside except — acceptable
    "E501",  # line length enforced by formatter, not linter
]

[lint.per-file-ignores]
"tests/**" = ["F841", "B007"]

[lint.isort]
known-first-party = ["sentinel"]
