version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./volumes/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: ../packages/engine
      dockerfile: ../../docker/Dockerfile.engine
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel@db:5432/sentinel
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=${APP_ENV:-paper}
      - MARKET_DATA_PROVIDER=${MARKET_DATA_PROVIDER:-mock}
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET:-}
    ports:
      - "8100:8100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: ../packages/mcp
      dockerfile: ../../docker/Dockerfile.mcp
    environment:
      - ENGINE_BASE_URL=http://engine:8100
      - MCP_TRANSPORT=sse
      - MCP_SSE_PORT=3100
      - NODE_ENV=${APP_ENV:-paper}
    ports:
      - "3100:3100"
    depends_on:
      engine:
        condition: service_healthy
